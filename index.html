<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>To-do & Chat App</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div id="auth-container">
    <h1>Inloggen / Registreren</h1>

    <div class="auth-forms">
      <div class="auth-box">
        <h2>Inloggen</h2>
        <input id="login-username" type="text" placeholder="Gebruikersnaam">
        <input id="login-password" type="password" placeholder="Wachtwoord">
        <button id="login-btn">Inloggen</button>
        <p id="login-error" class="error"></p>
      </div>

      <div class="auth-box">
        <h2>Registreren</h2>
        <input id="register-username" type="text" placeholder="Gebruikersnaam">
        <input id="register-password" type="password" placeholder="Wachtwoord">
        <label>
          <input id="register-is-admin" type="checkbox">
          Admin?
        </label>
        <button id="register-btn">Account aanmaken</button>
        <p id="register-error" class="error"></p>
      </div>
    </div>
  </div>

  <div id="app" class="hidden">
    <header>
      <h1>Welkom, <span id="current-user-name"></span></h1>
      <button id="logout-btn">Uitloggen</button>
    </header>

    <main>
      <section id="todo-section">
        <h2>To-do lijst</h2>
        <div class="todo-input">
          <input id="todo-input" type="text" placeholder="Nieuwe taak...">
          <button id="add-todo-btn">Toevoegen</button>
        </div>
        <ul id="todo-list"></ul>
      </section>

      <section id="chat-section">
        <h2>Chat</h2>
        <div id="chat-messages"></div>
        <div class="chat-input">
          <input id="chat-input" type="text" placeholder="Typ een bericht...">
          <button id="send-chat-btn">Verstuur</button>
        </div>
      </section>

      <section id="admin-section" class="hidden">
        <h2>Admin dashboard</h2>
        <p>Alle gebruikers en hun to-do’s:</p>
        <div id="admin-users"></div>
      </section>
    </main>
  </div>

  <script src="script.js"></script>
</body>
</html>
